<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backoffice</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        font-size: 20px;
        font-weight: 400;
        line-height: 1.5;
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
        color: #bababa;
        background-color: #1a1a1a;
      }
      main {
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        padding-top: 25vh;
        padding-left: 0.5rem;
        padding-right: 0.5rem;
        text-align: center;
      }
      div {
        font-size: 3rem;
      }
      h1 {
        font-family: monospace;
      }
      a {
        color: inherit;
      }
      p {
        margin-top: 0.25em;
        margin-bottom: 1.5em;
      }
      small {
        font-size: 0.8em;
        opacity: 0.8;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          "Noto Sans",
          sans-serif,
          "Apple Color Emoji",
          "Segoe UI Emoji",
          "Segoe UI Symbol",
          "Noto Color Emoji";
      }
      code {
        font-size: 0.7em;
        font-family: monospace;
        background-color: #2b2b2b;
        padding: 0.5em 0.75em;
        border-radius: 0.25em;
      }
      .button {
        opacity: 0.8;
        margin-top: 1.25em;
        font-size: 0.75rem;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial,
          "Noto Sans",
          sans-serif,
          "Apple Color Emoji",
          "Segoe UI Emoji",
          "Segoe UI Symbol",
          "Noto Color Emoji";
        display: inline-block;
        padding: 0.5em 0.75em;
        border-radius: 0.25em;
        text-decoration: underline;
        color: inherit;
      }
      pre {
        margin-top: -1rem;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div>🏤</div>
      <h1>Backoffice</h1>
      <p>
        Give your AI assistant — Claude.ai, ChatGPT, or any other — its own Linux machine that keeps
        working even when you're not in a conversation.
      </p>
      <p>
        <small>Ask your coding agent to set it up for you:</small>
      </p>
      <pre><code>claude "Read https://kvendrik.com/backoffice/AGENT.md"</code></pre>
      <p><a class="button" href="https://github.com/kvendrik/backoffice">View on Github</a></p>
    </main>
  </body>
</html>
